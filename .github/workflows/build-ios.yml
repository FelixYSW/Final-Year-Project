name: Build Unsigned iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Prebuild Expo iOS folder
        run: npx expo prebuild --platform ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build Unsigned App
        run: |
          cd ios
          xcodebuild -workspace accessiblenavapp.xcworkspace -scheme accessiblenavapp -sdk iphoneos -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build
          
      - name: Package into IPA
        run: |
          mkdir Payload
          cp -r ios/build/Build/Products/Release-iphoneos/accessiblenavapp.app Payload/
          zip -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-ios-app
          path: app.ipa
